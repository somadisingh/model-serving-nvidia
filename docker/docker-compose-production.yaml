name: production_pipeline
services:
  triton_server:
    image: nvcr.io/nvidia/tritonserver:24.10-py3
    container_name: triton_production
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    ports:
      - "8000:8000"   # HTTP
      - "8001:8001"   # gRPC
      - "8002:8002"   # Metrics
    volumes:
      - ../models_triton_production:/models
      - ../workspace/models/production/flickr_global_quantized_dynamic.onnx:/models/flickr_global/1/model.onnx:ro
      - ../workspace/models/production/flickr_personalized_optimized.onnx:/models/flickr_personalized/1/model.onnx:ro
    command: ["tritonserver", "--model-repository=/models"]

  triton_sdk:
    image: nvcr.io/nvidia/tritonserver:24.10-py3-sdk
    container_name: triton_production_sdk
    network_mode: "service:triton_server"
    entrypoint: ["sleep", "infinity"]

  jupyter:
    image: quay.io/jupyter/pytorch-notebook:cuda12-pytorch-2.5.1
    container_name: jupyter_production
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    ports:
      - "8888:8888"
    shm_size: 16G
    volumes:
      - ../workspace:/home/jovyan/work
      - aesthetic_data:/mnt
    environment:
      - AESTHETIC_DATA_DIR=/mnt/flickr-aes
    command: >
      bash -c "pip install --no-cache-dir
      'clip @ git+https://github.com/openai/CLIP.git'
      onnx==1.18.0 onnxruntime numpy psutil 'tritonclient[all]'
      && start-notebook.sh"

volumes:
  aesthetic_data:
    external: true

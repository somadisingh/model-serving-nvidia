volumes:
  aesthetic_data:
    external: true  # Uses externally created volume

services:
  init-data:
    image: python:3.11
    volumes:
      - aesthetic_data:/data
    working_dir: /data
    command:
      - bash
      - -c
      - |
        set -e  # Stop on error
        echo "Creating dataset directory..."
        mkdir -p /data/aesthetic-hub && cd /data/aesthetic-hub

        echo "Downloading dataset from HuggingFace..."
        curl -L "https://huggingface.co/datasets/somadisingh/aesthetic-hub/resolve/main/aesthetic-hub-data.zip" --output aesthetic-hub-data.zip

        echo "Extracting dataset..."
        unzip -q aesthetic-hub-data.zip
        rm aesthetic-hub-data.zip

        echo "Flattening directory structure..."
        mv aesthetic-hub-data/* .
        rm -rf aesthetic-hub-data __MACOSX .DS_Store

        echo "Dataset setup complete."
    restart: "no"
